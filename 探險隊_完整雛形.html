<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遺物商隊 Relic Caravan — 完整雛形</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<style>
  html,body{margin:0;background:#0e0a14;color:#d8cdb8;font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;text-align:center}
  h1{font-size:18px;margin:12px 0 2px;letter-spacing:3px;color:#e7c14a}
  p.sub{margin:0 0 8px;color:#8a7f9a;font-size:12px}
  #game{display:block;margin:0 auto;width:min(96vw,1000px);aspect-ratio:900/560;border:3px solid #2a2238;border-radius:6px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.6)}
</style>
</head>
<body>
  <h1>遺物商隊 · Relic Caravan</h1>
  <p class="sub">整備 → 地城選路 → 自動戰鬥 → 帶回遺物　|　一趟完整 run</p>
  <div id="game"></div>

  <!-- 多檔架構：依相依順序以傳統 script 載入（仍可 file:// 直接開啟） -->
  <script src="js/config.js"></script>        <!-- 平衡設定：所有可調數值集中於此 -->
  <script src="js/data.js"></script>          <!-- 純資料：調色盤、精靈、裝備、職業、技能 -->
  <script src="js/state.js"></script>         <!-- 全域狀態、存檔、設施/祝福/聲望、職業數值 -->
  <script src="js/ui.js"></script>            <!-- 共用繪圖工具：貼圖、文字、跳數字、按鈕 -->
  <script src="js/scenes/boot.js"></script>
  <script src="js/scenes/guildhall.js"></script>
  <script src="js/scenes/characterhall.js"></script> <!-- 角色所：技能查看＋裝備調整 -->
  <script src="js/scenes/wagonhall.js"></script>     <!-- 馬車強化所：選用＋升級貨車 -->
  <script src="js/scenes/warehousehall.js"></script> <!-- 倉庫所：查看持有物品 -->
  <script src="js/scenes/formationhall.js"></script>  <!-- 隊形：選擇陣形 -->
  <script src="js/scenes/recruithall.js"></script>    <!-- 招募所：第四職業法師 -->
  <script src="js/scenes/merchanthall.js"></script>   <!-- 商會：賣出倉庫物品換資金 -->
  <script src="js/scenes/traininghall.js"></script>   <!-- 訓練所：花資金換全隊經驗 -->
  <script src="js/scenes/outfit.js"></script>
  <script src="js/scenes/worldmap.js"></script> <!-- 世界地圖：選目的地 -->
  <script src="js/scenes/map.js"></script>    <!-- 含地圖場景與探險邏輯（掉落、遭遇、換裝） -->
  <script src="js/scenes/battle.js"></script>
  <script src="js/scenes/result.js"></script>
  <script src="js/main.js"></script>          <!-- 啟動 Phaser.Game -->
</body>
</html>
